<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>КОРОВАНЫ</title>
    <style>
      /* Шрифты меню/паузы: Forum — декоративный заголовок (средневековый дух),
         Philosopher — текст. Оба OFL, с кириллицей; засабсечены до Latin+Cyrillic
         и переведены в woff2 (~96 КБ суммарно). Источник/лицензия — в
         scripts/fetch-assets.sh. */
      @font-face {
        font-family: 'Forum';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/assets/fonts/Forum-Regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Philosopher';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/assets/fonts/Philosopher-Regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Philosopher';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/assets/fonts/Philosopher-Bold.woff2') format('woff2');
      }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0e14; }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; }
      #ui { position: fixed; inset: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
