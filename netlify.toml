# Конфигурация деплоя КОРОВАНОВ на Netlify.
# Сборка статики Vite в dist/, SPA-фоллбэк и кэш-заголовки для ассетов.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Версия Node для сборки — LTS, совпадает с .nvmrc.
  NODE_VERSION = "22"

# SPA-фоллбэк: любой прямой переход (например, обновление страницы по ссылке
# на под-маршрут) отдаёт index.html с кодом 200, не 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Ассеты Vite содержат хэш в имени файла, поэтому их можно кэшировать навсегда.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html — точка входа, не кэшируем, чтобы новые сборки подхватывались сразу.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
