name: Deploy to GitHub Pages

# Собирает игру и публикует на GitHub Pages при каждом пуше в main.
# Pages обслуживает сайт в подкаталоге /game-corovans/, поэтому сборка идёт
# с VITE_BASE=/game-corovans/ (см. vite.config.ts → base, src/core/assetUrl.ts).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно — один деплой; новый пуш отменяет незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (Pages base)
        run: npm run build
        env:
          VITE_BASE: /game-corovans/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
